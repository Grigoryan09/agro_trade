services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: agro_trade
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
    - "5432:5432"
    volumes:
        - postgres_data:/var/lib/postgresql/data
        - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d agro_trade" ]
      interval: 10s
      timeout: 5s
      retries: 5
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/agro_trade?currentSchema=agro_trade
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      # Inter-service call to chat-service by container name (localhost = this
      # container inside Docker, which is why chat creation was refused).
      CLIENT_CHATSERVICE_URL: http://chat_service:8081
      # Public server address — used to build browser-reachable media/document
      # links and the clickable order link embedded in notification e-mails.
      APP_BASE_URL: http://18.208.28.153:3000
      ORDER_SERVICE_BASEURL: http://18.208.28.153:3000/agro-trade-service
      # Container-local paths (the yaml defaults are Windows paths).
      APP_UPLOAD_DIR: /app/storage
      LOGGING_FILE_NAME: /app/log/agro-trade-web.log
    volumes:
      - agro_storage:/app/storage
      - agro_logs:/app/log

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:29092,CONTROLLER://:9093,PLAINTEXT_HOST://:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://host.docker.internal:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

volumes:
  postgres_data:
  agro_storage:
  agro_logs: